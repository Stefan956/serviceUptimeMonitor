spring:
  application:
    name: monitoring-service

  profiles:
    active: dev

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: monitoring-service

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

---
# =========================
# DEV PROFILE
# =========================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

server:
  port: 8080

alert:
  service:
    url: http://localhost:8082

monitoring:
  scheduler:
    enabled: true
    fixed-delay-ms: 30000
---
# =========================
# DOCKER PROFILE
# Running with Docker Compose
# =========================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres:5432/uptime_monitor
    username: ${POSTGRES_USER:uptime_user}
    password: ${POSTGRES_PASSWORD:uptime_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

monitoring:
  scheduler:
    enabled: true
    fixed-delay-ms: 30000

alert:
  service:
    url: http://alert-service:8080

