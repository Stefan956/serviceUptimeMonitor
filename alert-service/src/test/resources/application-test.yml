spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: false

alert:
  email:
    enabled: false
    from: alerts@test.com
    to: admin@test.com
  console:
    enabled: true
  cooldown-ms: 300000

management:
  health:
    mail:
      enabled: false

logging:
  level:
    root: INFO
    com.github.Stefan956.serviceUptimeMonitor: DEBUG
    org.hibernate.SQL: DEBUG
