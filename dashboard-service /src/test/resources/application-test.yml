spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: false

monitoring:
  service:
    url: http://localhost:9999

dashboard:
  polling:
    interval-ms: 600000

logging:
  level:
    root: INFO
    com.github.Stefan956.serviceUptimeMonitor: DEBUG
