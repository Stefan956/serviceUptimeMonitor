services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: uptime-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uptime_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uptime_pass}
      POSTGRES_DB: uptime_monitor      # alert_db is created by the init script
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uptime_user} -d uptime_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: uptime-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — http://localhost:8025
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: uptime-prometheus
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    depends_on:
      - monitoring-service
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: uptime-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"   # http://localhost:3000  (admin / admin)
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Application services ─────────────────────────────────────────────────────

  monitoring-service:
    build:
      context: .
      dockerfile: monitoring-service/Dockerfile
    container_name: uptime-monitoring
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"   # REST API + Swagger: http://localhost:8080/swagger-ui.html
                      # Prometheus:          http://localhost:8080/actuator/prometheus
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure

  alert-service:
    build:
      context: .
      dockerfile: alert-service/Dockerfile
    container_name: uptime-alert
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ALERT_EMAIL_ENABLED: "true"
    ports:
      - "8082:8080"   # REST API + Swagger: http://localhost:8082/swagger-ui.html
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: on-failure

  dashboard-service:
    build:
      context: .
      dockerfile: dashboard-service/Dockerfile
    container_name: uptime-dashboard
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8083:8080"   # REST API + Swagger: http://localhost:8083/swagger-ui.html
                      # SSE stream:          http://localhost:8083/api/dashboard/stream
    depends_on:
      monitoring-service:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
